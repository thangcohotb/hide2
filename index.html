<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web văn bản</title>
    <style>
        /* CSS nén để chữ nhỏ và đồng đều */
        body{margin:40px;font-family:sans-serif;background-color:#fff;color:#333}h1,h2,p,span,div{font-size:13px;font-weight:400;margin:0 0 10px 0;line-height:1.5;display:inline-block;width:100%}
    </style>
</head>
<body>

    <h1>Đây là dòng tiêu đề nhưng kích thước vẫn nhỏ bằng văn bản thường.</h1>
    
    <p>Tất cả các chữ ở đây đều được thiết lập cỡ 13px (nhỏ hơn mức bình thường một chút) và có độ dày nét chữ (font-weight) như nhau.</p>
    
    <div>Bạn có thể thêm bao nhiêu dòng tùy thích, chúng sẽ luôn đồng đều với nhau về kích thước và kiểu chữ.</div>

</body>
</html>
